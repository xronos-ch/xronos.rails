name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xronos
        options: >-
          --health-cmd "pg_isready -U postgres -d xronos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      RAILS_ENV: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xronos
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/xronos_test
      COVERAGE: true
      REGISTRATION_PASSPHRASE: xronos
      ADMIN_USER_ID: 1
      ADMIN_USER_EMAIL: admin@xronos.ch
      ADMIN_USER_PASSWORD: xronos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libboost-program-options-dev

      - name: Build calibrator
        run: bin/build_calibrator

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Run test suite
        run: bin/rails test

      - name: Run system test suite
        run: bin/rails test:system

      - name: Determine Codecov parent commit
        id: codecov_parent
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
          override_branch: ${{ github.head_ref || github.ref_name }}
          override_commit: ${{ github.event.pull_request.head.sha || github.sha }}
          override_pr: ${{ github.event.pull_request.number }}
          commit_parent: ${{ steps.codecov_parent.outputs.sha }}